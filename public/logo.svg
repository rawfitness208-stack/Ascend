<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 52" width="210" height="52">
  <!-- Icon: kettlebell circle with mountain peaks -->
  <circle cx="26" cy="26" r="24" fill="#1a1a1a" stroke="#F5A623" stroke-width="2"/>
  <!-- Kettlebell handle -->
  <path d="M16 24 Q16 13 26 13 Q36 13 36 24" stroke="#F5A623" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Kettlebell body -->
  <ellipse cx="26" cy="33" rx="10.5" ry="9.5" fill="#F5A623"/>
  <!-- Mountain peaks inside kettlebell body -->
  <polygon points="17.5,40 22,30 26,34.5 30,28 35.5,40" fill="#1a1a1a"/>

  <!-- ASCEND text -->
  <text x="58" y="28"
    font-family="'Arial Black','Arial',sans-serif"
    font-weight="900"
    font-size="21"
    fill="white"
    letter-spacing="2">ASCEND</text>
  <!-- FITNESS subtext -->
  <text x="60" y="42"
    font-family="'Arial','Helvetica',sans-serif"
    font-weight="400"
    font-size="10"
    fill="#F5A623"
    letter-spacing="6">FITNESS</text>
</svg>
